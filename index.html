<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meeple Mapper | UK Tabletop Directory</title>
    <style>
        :root {
            /* Vibrant, Multi-Color Palette */
            --magenta: #d946ef; /* Retailers */
            --teal: #14b8a6;    /* Cafes */
            --orange: #f97316;  /* Events */
            
            /* UI Colors */
            --primary: #6366f1;
            --dark: #1e293b;
            --light: #f8fafc;
            --text-subtle: #64748b;
            --border: #e2e8f0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--light);
            color: var(--dark);
            /* Smaller, neater text base */
            font-size: 14px; 
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* Optimized, Subtle Animated Background */
        .meeple-bg {
            position: fixed;
            top: -5%;
            right: -5%;
            width: 300px; /* Smaller */
            height: 300px;
            background: var(--primary);
            opacity: 0.04; /* Even more subtle */
            mask-image: url('data:image/svg+xml;utf8,<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"><path d="M50 5 L70 30 L65 55 L85 90 L15 90 L35 55 L30 30 Z" /></svg>');
            -webkit-mask-image: url('data:image/svg+xml;utf8,<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"><path d="M50 5 L70 30 L65 55 L85 90 L15 90 L35 55 L30 30 Z" /></svg>');
            mask-repeat: no-repeat;
            animation: floatMeeple 25s infinite alternate ease-in-out;
            z-index: -1;
        }

        @keyframes floatMeeple {
            0% { transform: translate(0, 0) rotate(0deg); }
            100% { transform: translate(-80px, 80px) rotate(10deg); }
        }

        /* Layout */
        .container {
            max-width: 900px; /* Neater constraint */
            margin: 0 auto;
            padding: 0 1.5rem;
        }

        /* Hero Section */
        header {
            height: 80vh; /* Reduced height for neater fold */
            display: flex;
            flex-direction: column;
            justify-content: center;
            animation: fadeIn 0.8s ease-out;
        }

        .badge {
            display: inline-block;
            background: #e0e7ff;
            color: var(--primary);
            padding: 0.4rem 0.8rem;
            border-radius: 16px;
            font-weight: 700;
            font-size: 0.75rem; /* Small & Neat */
            letter-spacing: 0.05em;
            margin-bottom: 1rem;
        }

        h1 {
            /* Smaller but impactful hero text */
            font-size: clamp(2rem, 6vw, 3.5rem); 
            line-height: 1.1;
            margin-bottom: 1rem;
            letter-spacing: -0.02em;
        }

        p.hero-text {
            font-size: 1.1rem; /* Smaller text */
            max-width: 550px;
            margin-bottom: 2rem;
            color: var(--text-subtle);
        }

        .cta-group {
            display: flex;
            gap: 0.75rem;
        }

        .btn {
            padding: 0.75rem 1.5rem; /* Smaller buttons */
            border-radius: 6px;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.2s ease;
        }

        .btn-primary { 
            background: var(--primary); 
            color: white; 
        }
        
        .btn-primary:hover { 
            transform: translateY(-2px); 
            box-shadow: 0 8px 20px -4px rgba(99, 102, 241, 0.4); 
        }

        /* About & Grid Section */
        section {
            padding: 5rem 0;
        }

        h2 {
            font-size: 1.75rem; /* Neater section title */
            margin-bottom: 0.5rem;
        }

        .section-desc {
            color: var(--text-subtle);
            max-width: 600px;
            margin-bottom: 3rem;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); /* Tighter grid */
            gap: 1.5rem;
        }

        .card {
            background: white;
            padding: 1.75rem; /* Neater padding */
            border-radius: 10px;
            border: 1px solid var(--border);
            transition: border-color 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .card:hover {
            border-color: #cbd5e1;
        }

        /* Card Color Accents */
        .card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 3px;
        }
        
        .card.retailers::before { background: var(--magenta); }
        .card.cafes::before { background: var(--teal); }
        .card.events::before { background: var(--orange); }

        .card h3 {
            font-size: 1.1rem; /* Neat card titles */
            margin-bottom: 0.5rem;
        }

        .card-tag {
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.75rem;
            display: block;
        }

        /* Global Animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Responsiveness */
        @media (max-width: 600px) {
            .cta-group { flex-direction: column; }
            header { height: auto; padding: 6rem 0; }
        }
    </style>
</head>
<body>

    <div style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(135deg, #fdfcfb 0%, #e2d1c310 100%); z-index: -2;"></div>
    
    <div class="meeple-bg"></div>

    <div class="container">
        <header>
            <span class="badge">UK TABLETOP DIRECTORY</span>
            <h1>Mapping the world of tabletop gaming.</h1>
            <p class="hero-text">Connecting local game stores and cafes with new audiences. From our success in Bournemouth to retailers across the UK.</p>
            <div class="cta-group">
                <a href="#directory" class="btn btn-primary">Find a Store</a>
                <a href="#about" class="btn" style="border: 1px solid #cbd5e1; color: var(--dark);">Our Bournemouth Story</a>
            </div>
        </header>

        <section id="about">
            <h2>Reaching New Audiences</h2>
            <p class="section-desc">We bridge the gap between local game stores and the wider community. Our proven event model in Bournemouth helps retailers connect with diverse new groups, demonstrating that board games truly are for everyone.</p>
            
            <div class="grid">
                <div class="card retailers">
                    <span class="card-tag" style="color: var(--magenta);">Directory</span>
                    <h3>Retailer Lists</h3>
                    <p>A comprehensive, searchable index of UK board game retailers, kept current for 2026.</p>
                </div>
                <div class="card cafes">
                    <span class="card-tag" style="color: var(--teal);">Venues</span>
                    <h3>Gaming Cafes</h3>
                    <p>Discover community hubs and dedicated gaming venues in your local area.</p>
                </div>
                <div class="card events">
                    <span class="card-tag" style="color: var(--orange);">Consulting</span>
                    <h3>Event Support</h3>
                    <p>Applying our Bournemouth success to help stores launch inclusive community events.</p>
                </div>
            </div>
        </section>

        <footer style="text-align: center; padding: 3rem 0; color: #94a3b8; font-size: 0.8rem; border-top: 1px solid var(--border);">
            &copy; 2026 Meeple Mapper. Built for the UK Gaming Community.
        </footer>
    </div>

</body>
</html>
